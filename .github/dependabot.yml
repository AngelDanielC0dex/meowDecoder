version: 2
updates:
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Keep noisy minor/patch bumps in a single PR.
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /training
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
