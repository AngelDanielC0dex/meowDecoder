name: CI

on:
  push:
    branches: [main]
  pull_request:

# A failing gate blocks the merge — quality is not optional.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint · typecheck · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Supply-chain gate: fail the build on known high/critical advisories.
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://meowdecoder.app

  training:
    name: Training (lint · feature tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q

  parity:
    name: JS↔Python feature parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Regenerate fixtures from Python, then assert the committed ones are current,
      # so a feature change on either side that breaks parity fails the build.
      - run: pip install -e ".[dev]"
        working-directory: training
      - run: PYTHONPATH=src python scripts/generate_parity_fixtures.py
        working-directory: training
      - run: git diff --exit-code web/tests/fixtures/parity.json
      - run: npm ci
        working-directory: web
      - run: npx vitest run tests/inference/parity.test.ts
        working-directory: web

  lighthouse:
    name: Lighthouse CI (budgets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_SITE_URL: https://meowdecoder.app
      # Non-blocking until budgets are tuned against real runs, then drop
      # continue-on-error to make performance/SEO/a11y regressions fail the merge.
      - name: Run Lighthouse CI
        continue-on-error: true
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./web/.lighthouserc.json
