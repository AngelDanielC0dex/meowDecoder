audio:
  # Source folder for `extract`. Point to the cleaned dataset built by
  # scripts/rebuild_clean_dataset.py.
  processed_dir: data/processed_clean
  sample_rate: 16000
  highpass_cutoff: 100.0
  # NOTE: the keys below (frame/mel/window) are the DSP contract shared with the
  # browser heuristic engine (web) via features.py / parity fixtures. Keep them
  # in sync with web; they are NOT used by the YAMNet pipeline itself.
  frame_size: 512
  hop_size: 256
  n_mels: 64
  n_frames: 96
  window_s: 1.5
  f_min: 50
  max_clip_duration: 10.0
  min_clip_duration: 0.96
classes:
- feliz_contento
- trinos
- enfadado
- pelea
- llamada_madre
- llamada_apareamiento
- dolor
- descansando
- advertencia
- atencion
train:
  model_type: yamnet_head   # YAMNet (frozen) + dense head. (adversarial approach abandoned)
  batch_size: 64
  epochs: 100
  lr: 0.001
  lr_decay_factor: 0.5
  lr_decay_patience: 8
  weight_decay: 0.0001
  seed: 42
  early_stopping_patience: 15
  group_by: cat_id
  min_cats_per_class: 3
  use_class_weights: true
  cv_folds: 5            # StratifiedGroupKFold splits (primary CV protocol)
  majority_cap: 1200     # cap per class to balance descansando/atencion (null = off)
yamnet:
  hub_url: https://tfhub.dev/google/yamnet/1
  trainable: false
  embedding_dim: 1024
  aggregation: mean_std
  frame_filter:          # keep only YAMNet frames where a cat-class score is high
    enabled: false       # DISABLED: too aggressive, hurt OOF (0.443 -> 0.354)
    percentile: 60
    min_score: 0.05
    min_frames: 2
    # AudioSet indices VERIFIED against yamnet_class_map.csv:
    # 67 Animal, 68 Domestic animals/pets, 74 Growling, 76 Cat, 77 Purr,
    # 78 Meow, 79 Hiss, 80 Caterwaul.
    audioset_indices: [67, 68, 74, 76, 77, 78, 79, 80]
  head_hidden_layers:    # best sweep config 2026-06 (OOF 0.642, prosodia+trim)
  - 256
  - 128
  head_dropout:
  - 0.5
  - 0.4
  head_l2_reg: 0.0001

prosodic:
  # Concatena 25 features prosódicas (F0/contorno/duración/jitter/HNR/espectral)
  # al embedding YAMNet. Ataca el solapamiento de la familia maullido
  # (feliz/atencion/dolor) que YAMNet no separa porque descarta la prosodia.
  # input_dim pasa de 2048 a 2073 (se infiere automáticamente en train).
  enabled: true

temporal_smoothing:
  window_s: 3.0
  ema_alpha: 0.3
  min_confidence: 0.45
augment:
  time_shift_ms: 100
  noise_snr_db:
  - 10
  - 30
  pitch_semitones:
  - -1
  - 1
  spec_augment: true
  augment_factor: 3
export:
  model_version: yamnet-10cls-2026.06.0
  opset: 17
  quantize_int8: true
  parity_tolerance: 0.005
  export_yamnet_onnx: true
  export_head_onnx: true
